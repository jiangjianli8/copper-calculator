<!DOCTYPE html>

<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>铜矿石计价器 · 鑫善源 🔶</title>

<style>

:root {
  --bg: #0a0a0f;
  --card: #1a1a25;
  --card2: #22222e;
  --text: #ffffff;
  --text2: #a0a0c0;
  --primary: #ff6b35;
  --primary-light: #ffd700;
  --primary-dark: #c73e1d;
  --gold: #ffd700;
  --accent: #ff9f43;
  --danger: #ff4466;
  --border: #2a2a3a;
  --radius: 16px;
  --radius-sm: 10px;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  padding: 16px;
  position: relative;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: 
    radial-gradient(circle at 20% 30%, rgba(155, 0, 255, 0.05) 0%, transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(0, 45, 255, 0.05) 0%, transparent 40%);
  pointer-events: none;
  z-index: 0;
  animation: bgFloat 20s ease-in-out infinite;
}

@keyframes bgFloat {
  0%, 100% { transform: translate(0, 0); }
  50% { transform: translate(1%, -1%); }
}

.container { width:100%; max-width:520px; position: relative; z-index: 1; }

.header {
  text-align: center;
  padding: 24px 0 20px;
}

.header h1 {
  font-size: 2rem;
  font-weight: 900;
  background: linear-gradient(135deg, var(--primary-light), var(--gold));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 1px;
}

.header .subtitle {
  font-size: 0.8rem;
  color: var(--text2);
  margin-top: 6px;
  letter-spacing: 1px;
}

.header .source-dot {
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  vertical-align: middle;
  margin-right: 4px;
}

.header .source-dot.live {
  background: #00ff88;
  box-shadow: 0 0 10px #00ff88;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%,100% { opacity:1; }
  50% { opacity:0.4; }
}

.price-card {
  background: linear-gradient(135deg, rgba(255,107,53,0.08), rgba(199,62,29,0.06));
  border: 1px solid var(--primary-dark);
  border-radius: var(--radius);
  padding: 18px 20px;
  margin-bottom: 16px;
  position: relative;
  overflow: hidden;
  backdrop-filter: blur(10px);
}

.price-card::before {
  content: '';
  position: absolute;
  top: -50%;
  right: -30%;
  width: 140px;
  height: 140px;
  background: radial-gradient(circle, var(--primary) 0%, transparent 70%);
  opacity: 0.12;
  border-radius: 50%;
  animation: priceGlow 4s ease-in-out infinite;
}

@keyframes priceGlow {
  0%, 100% { transform: scale(1); opacity: 0.08; }
  50% { transform: scale(1.1); opacity: 0.15; }
}

.price-label {
  font-size: 0.75rem;
  color: var(--primary-light);
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.price-label .dot {
  width: 8px; height: 8px;
  background: #00ff88;
  border-radius: 50%;
  animation: pulse 2s infinite;
  box-shadow: 0 0 8px #00ff88;
}

.price-value {
  font-size: 2.2rem;
  font-weight: 800;
  color: var(--primary-light);
  line-height: 1;
  background: linear-gradient(135deg, var(--primary-light), var(--gold));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.price-value .unit {
  font-size: 0.9rem;
  font-weight: 400;
  color: var(--text2);
  margin-left: 4px;
  -webkit-text-fill-color: var(--text2);
}

.price-meta {
  font-size: 0.7rem;
  color: var(--text2);
  margin-top: 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.refresh-btn {
  background: rgba(255,107,53,0.15);
  border: 1px solid var(--primary-dark);
  color: var(--primary-light);
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 0.7rem;
  cursor: pointer;
  transition: all 0.3s;
  font-weight: 600;
}

.refresh-btn:hover {
  background: rgba(255,107,53,0.25);
  box-shadow: 0 0 15px rgba(255,107,53,0.3);
}

.refresh-btn:active { transform: scale(0.95); }

.manual-price {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 12px;
  font-size: 0.75rem;
}

.manual-price input {
  background: var(--card2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 6px 10px;
  border-radius: 8px;
  width: 120px;
  font-size: 0.8rem;
  text-align: center;
}

.manual-price input:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(255,107,53,0.15);
}

.manual-price button {
  background: var(--primary-dark);
  border: none;
  color: #fff;
  padding: 6px 14px;
  border-radius: 8px;
  font-size: 0.7rem;
  cursor: pointer;
  font-weight: 600;
}

.manual-price .toggle {
  font-size: 0.65rem;
  color: var(--primary-light);
  cursor: pointer;
  text-decoration: underline;
}

.calc-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 16px;
  transition: all 0.3s;
}

.calc-card:hover {
  border-color: var(--primary-dark);
  box-shadow: 0 0 20px rgba(255,107,53,0.1);
}

.calc-card h2 {
  font-size: 0.9rem;
  font-weight: 700;
  color: var(--text2);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.calc-card h2::before {
  content: '';
  width: 3px;
  height: 16px;
  background: linear-gradient(180deg, var(--primary), var(--primary-light));
  border-radius: 2px;
}

.calc-card h2 .icon { font-size: 1.2rem; }

.grade-section { margin-bottom: 20px; }

.grade-label {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 10px;
}

.grade-label .name { font-size: 0.8rem; color: var(--text2); letter-spacing: 0.5px; }

.grade-label .value {
  font-size: 1.8rem;
  font-weight: 800;
  color: var(--primary-light);
  background: linear-gradient(135deg, var(--primary-light), var(--gold));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.grade-label .value .pct {
  font-size: 1rem;
  color: var(--text2);
  -webkit-text-fill-color: var(--text2);
}

.slider-wrap {
  position: relative;
  padding: 8px 0;
}

input[type=range] {
  -webkit-appearance: none;
  width: 100%;
  height: 10px;
  border-radius: 5px;
  background: linear-gradient(90deg, var(--primary-dark), var(--primary), var(--gold));
  outline: none;
}

input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--primary-light);
  border: 3px solid #fff;
  cursor: pointer;
  box-shadow: 0 2px 12px var(--primary);
  transition: all 0.2s;
}

input[type=range]::-webkit-slider-thumb:hover {
  transform: scale(1.1);
  box-shadow: 0 4px 20px var(--primary);
}

.grade-ticks {
  display: flex;
  justify-content: space-between;
  font-size: 0.65rem;
  color: var(--text2);
  padding: 4px 8px 0;
}

.grade-presets {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: 12px;
}

.grade-presets button {
  background: var(--card2);
  border: 1px solid var(--border);
  color: var(--text2);
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 0.7rem;
  cursor: pointer;
  transition: all 0.2s;
  font-weight: 600;
}

.grade-presets button:hover {
  border-color: var(--primary);
  color: var(--primary-light);
  background: rgba(255,107,53,0.1);
}

.grade-presets button.active {
  background: rgba(255,107,53,0.2);
  border-color: var(--primary);
  color: var(--primary-light);
  box-shadow: 0 0 10px rgba(255,107,53,0.2);
}

.coeff-display {
  background: var(--card2);
  border-radius: var(--radius-sm);
  padding: 14px 18px;
  margin-bottom: 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border: 1px solid var(--border);
}

.coeff-display .label { font-size: 0.8rem; color: var(--text2); letter-spacing: 0.5px; }

.coeff-display .value {
  font-size: 1.5rem;
  font-weight: 800;
  color: var(--accent);
  text-shadow: 0 0 10px rgba(0,240,255,0.2);
}

.result-card {
  background: linear-gradient(135deg, rgba(255,107,53,0.1), rgba(199,62,29,0.08));
  border: 2px solid var(--primary-dark);
  border-radius: var(--radius);
  padding: 24px 20px;
  text-align: center;
  margin-bottom: 16px;
  position: relative;
  overflow: hidden;
}

.result-card::before {
  content: '';
  position: absolute;
  top: -50%;
  left: 50%;
  transform: translateX(-50%);
  width: 200px;
  height: 200px;
  background: radial-gradient(circle, var(--gold) 0%, transparent 70%);
  opacity: 0.08;
  border-radius: 50%;
}

.result-card .label {
  font-size: 0.8rem;
  color: var(--primary-light);
  margin-bottom: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
}

.result-card .value {
  font-size: 2.8rem;
  font-weight: 900;
  color: var(--gold);
  line-height: 1;
  text-shadow: 0 0 20px rgba(255,215,0,0.3);
  position: relative;
  z-index: 1;
}

.result-card .unit {
  font-size: 0.9rem;
  font-weight: 400;
  color: var(--text2);
}

.result-formula {
  font-size: 0.7rem;
  color: var(--text2);
  margin-top: 12px;
  line-height: 1.6;
}

.coeff-table-wrap {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.5s ease;
}

.coeff-table-wrap.open { max-height: 600px; }

.coeff-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.75rem;
  margin-top: 12px;
}

.coeff-table th, .coeff-table td {
  padding: 10px 12px;
  text-align: center;
  border-bottom: 1px solid var(--border);
}

.coeff-table th {
  color: var(--text2);
  font-weight: 600;
  font-size: 0.7rem;
  background: var(--card2);
}

.coeff-table tr:hover td { background: rgba(255,107,53,0.08); }

.coeff-table tr.current td {
  background: rgba(255,107,53,0.18);
  color: var(--primary-light);
  font-weight: 700;
}

.toggle-table-btn {
  width: 100%;
  background: none;
  border: 1px dashed var(--border);
  color: var(--text2);
  padding: 10px;
  border-radius: 10px;
  font-size: 0.7rem;
  cursor: pointer;
  margin-top: 10px;
  transition: all 0.2s;
}

.toggle-table-btn:hover {
  border-color: var(--primary);
  color: var(--primary-light);
  background: rgba(255,107,53,0.05);
}

.multi-ores { margin-top: 20px; }

.multi-ores h3 {
  font-size: 0.85rem;
  color: var(--text2);
  margin-bottom: 10px;
  letter-spacing: 0.5px;
}

.ore-row {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-bottom: 8px;
  padding: 12px;
  background: var(--card2);
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  transition: all 0.2s;
}

.ore-row:hover {
  border-color: var(--primary-dark);
}

.ore-row .ore-grade {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 6px;
}

.ore-row input {
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px;
  border-radius: 8px;
  width: 80px;
  font-size: 0.85rem;
  text-align: center;
  font-weight: 600;
}

.ore-row input:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(255,107,53,0.15);
}

.ore-row .ore-result {
  font-size: 0.9rem;
  font-weight: 700;
  color: var(--primary-light);
  min-width: 100px;
  text-align: right;
}

.ore-row .ore-del {
  background: none;
  border: none;
  color: var(--danger);
  cursor: pointer;
  font-size: 1.4rem;
  padding: 0 4px;
  line-height: 1;
}

.add-ore-btn {
  width: 100%;
  background: none;
  border: 1px dashed var(--border);
  color: var(--text2);
  padding: 10px;
  border-radius: 10px;
  font-size: 0.7rem;
  cursor: pointer;
  margin-bottom: 10px;
  transition: all 0.2s;
}

.add-ore-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(0,240,255,0.05);
}

.total-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 18px;
  background: rgba(255,107,53,0.12);
  border-radius: var(--radius-sm);
  border: 1px solid var(--primary-dark);
}

.total-row .label { font-size: 0.85rem; color: var(--primary-light); font-weight: 600; }

.total-row .value {
  font-size: 1.3rem;
  font-weight: 800;
  color: var(--gold);
  text-shadow: 0 0 10px rgba(255,215,0,0.2);
}

.footer {
  text-align: center;
  padding: 20px 16px;
  font-size: 0.7rem;
  color: var(--text2);
  letter-spacing: 1px;
}

.footer span {
  font-weight: 900;
  color: var(--primary);
  font-size: 1.1rem;
}

.price-error {
  color: var(--danger);
  font-size: 0.7rem;
}

</style>

</head>

<body>

<div class="container">

  <div class="header">

    <h1>铜矿石套保计算器</h1>

    <div class="subtitle">基于SMM 1#电解铜现货行情</div>

  </div>



  <!-- 实时铜价 -->

  <div class="price-card">

    <div class="price-label"><span class="dot"></span> SMM 1#电解铜（现货）</div>

    <div class="price-value" id="priceDisplay">--<span class="unit">元/吨</span></div>

    <div class="price-meta">

      <span id="priceTime">加载中...</span>

      <button class="refresh-btn" onclick="fetchPrice()">🔄 刷新</button>

    </div>

    <div class="manual-price" id="manualPriceRow" style="display:none">

      <span>手动输入:</span>

      <input type="number" id="manualPriceInput" placeholder="价格 (元/吨)">

      <button onclick="setManualPrice()">确定</button>

    </div>

    <span class="toggle" style="font-size:0.65rem;color:var(--text2);cursor:pointer;margin-top:4px;display:inline-block" onclick="document.getElementById('manualPriceRow').style.display='flex';this.style.display='none'">或手动输入价格</span>

  </div>



  <!-- 计算器 -->

  <div class="calc-card">

    <h2><span class="icon">📐</span> 矿石计价计算</h2>



    <div class="grade-section">

      <div class="grade-label">

        <span class="name">铜矿石品位 (Cu%)</span>

        <span class="value" id="gradeValue">5<span class="pct">%</span></span>

      </div>

      <div class="slider-wrap">

        <input type="range" id="gradeSlider" min="1" max="21" value="5" step="0.1" oninput="updateCalc()">

      </div>

      <div class="grade-ticks"><span>1%</span><span>5%</span><span>10%</span><span>15%</span><span>21%</span></div>

      <div class="grade-presets" id="gradePresets"></div>

    </div>



    <div class="coeff-display">

      <span class="label">📊 铜计价系数</span>

      <span class="value" id="coeffValue">65.00%</span>

    </div>

  </div>



  <!-- 结果 -->

  <div class="result-card">

    <div class="label">💰 铜矿石单价</div>

    <div class="value" id="orePrice">--<span class="unit">元/吨</span></div>

    <div class="result-formula" id="formulaDisplay"></div>

  </div>



  <!-- 多矿计算 -->

  



  



<script>

// ==================== 系数表数据 ====================

var COEFF_TABLE = [

  [1,40],[2,45],[3,50],[4,60],[5,65],[6,68],[7,70],[8,72],[9,74],[10,76],

  [11,78],[12,80],[13,83],[14,86],[15,88],[16,89],[17,90],[18,91],[19,92],[20,93],[21,95]

];



var basePrice = 101570; // 默认价格

var manualOverride = false;



// ==================== 系数查表（线性插值） ====================

function getCoefficient(grade) {

  if (grade <= 1) return 40;

  if (grade >= 21) return 95;

  for (var i = 0; i < COEFF_TABLE.length - 1; i++) {

    var g1 = COEFF_TABLE[i][0], c1 = COEFF_TABLE[i][1];

    var g2 = COEFF_TABLE[i+1][0], c2 = COEFF_TABLE[i+1][1];

    if (grade >= g1 && grade <= g2) {

      var t = (grade - g1) / (g2 - g1);

      return c1 + t * (c2 - c1);

    }

  }

  return 95;

}



// ==================== 计算 ====================

function updateCalc() {

  var grade = parseFloat(document.getElementById('gradeSlider').value);

  var coeff = getCoefficient(grade);

  var orePrice = basePrice * (grade / 100) * (coeff / 100);



  document.getElementById('gradeValue').innerHTML = grade.toFixed(1) + '<span class="pct">%</span>';

  document.getElementById('coeffValue').textContent = coeff.toFixed(2) + '%';

  document.getElementById('orePrice').innerHTML = orePrice.toFixed(0) + '<span class="unit">元/吨</span>';

  document.getElementById('formulaDisplay').textContent =

    basePrice.toLocaleString() + ' × ' + grade.toFixed(1) + '% × ' + coeff.toFixed(2) + '% = ' + orePrice.toFixed(0) + ' 元/吨';



  // 高亮当前行

  highlightTableRow(grade);

  // 更新预设按钮

  updatePresetButtons(grade);

  // 更新多矿批量

  updateMultiOres();

}



function highlightTableRow(grade) {

  var rows = document.querySelectorAll('#coeffTable tr');

  var intGrade = Math.round(grade);

  rows.forEach(function(r) { r.classList.remove('current'); });

  // 找最接近的整数行

  rows.forEach(function(r) {

    var cells = r.querySelectorAll('td');

    if (cells.length > 0 && parseInt(cells[0].textContent) === intGrade) {

      r.classList.add('current');

    }

  });

}



// ==================== 价格获取 ====================

function fetchPrice() {

    var d = document.getElementById('priceDisplay');

    var t = document.getElementById('priceTime');

    var dot = document.getElementById('statusDot');

    d.innerHTML = '<span class="spinner"></span>';

    if (dot) dot.style.background = '#daa520';

    fetch('data/price.json?t=' + Date.now())

      .then(function(r) { return r.json(); })

      .then(function(data) {

        if (!manualOverride && data.price > 0) basePrice = data.price;

        d.innerHTML = basePrice.toLocaleString() + '<span class="unit">元/吨</span>';

        t.textContent = '更新于 ' + (data.updated_at || data.date || '');

        if (dot) dot.style.background = '#4caf50';

        if (!manualOverride) { updateCalc(); renderOreRows(); }

      })

      .catch(function() {

        d.innerHTML = basePrice.toLocaleString() + '<span class="unit">元/吨</span>';

        t.innerHTML = '<span class="price-error">离线 · SMM参考价</span>';

        if (dot) dot.style.background = '#e05555';

        updateCalc(); renderOreRows();

      });

  }

  function setManualPrice() {

  var val = parseFloat(document.getElementById('manualPriceInput').value);

  if (val > 0) {

    basePrice = val;

    manualOverride = true;

    document.getElementById('priceDisplay').innerHTML = val.toLocaleString() + '<span class="unit">元/吨</span>';

    document.getElementById('priceTime').textContent = '手动输入价格';

    var dot = document.getElementById('statusDot');

    if (dot) dot.style.background = '#daa520';

    updateCalc(); renderOreRows();

  }

}



// ==================== 预设按钮 ====================

function buildPresetButtons() {

  var container = document.getElementById('gradePresets');

  var presets = [1,3,5,8,10,12,15,18,21];

  presets.forEach(function(g) {

    var btn = document.createElement('button');

    btn.textContent = g + '%';

    btn.onclick = function() {

      document.getElementById('gradeSlider').value = g;

      updateCalc();

    };

    container.appendChild(btn);

  });

}



function updatePresetButtons(grade) {

  var buttons = document.querySelectorAll('#gradePresets button');

  buttons.forEach(function(btn) {

    var g = parseInt(btn.textContent);

    if (Math.abs(g - grade) < 0.05) {

      btn.classList.add('active');

    } else {

      btn.classList.remove('active');

    }

  });

}



// ==================== 系数参考表 ====================

function buildCoeffTable() {

  var table = document.getElementById('coeffTable');

  var html = '<tr><th>铜品位 Cu%</th><th>铜系数</th><th>铜品位 Cu%</th><th>铜系数</th></tr>';

  var half = Math.ceil(COEFF_TABLE.length / 2);

  for (var i = 0; i < half; i++) {

    var left = COEFF_TABLE[i];

    var right = COEFF_TABLE[i + half];

    html += '<tr><td>' + left[0] + '%</td><td>' + left[1] + '%</td>';

    if (right) {

      html += '<td>' + right[0] + '%</td><td>' + right[1] + '%</td>';

    } else {

      html += '<td></td><td></td>';

    }

    html += '</tr>';

  }

  table.innerHTML = html;

}



function toggleTable() {

  var wrap = document.getElementById('coeffTableWrap');

  wrap.classList.toggle('open');

}



// ==================== 多矿批量 ====================

var oreRows = [5, 8, 12]; // 默认三行



function renderOreRows() {

  var list = document.getElementById('oreList');

  list.innerHTML = '';

  oreRows.forEach(function(grade, idx) {

    var coeff = getCoefficient(grade);

    var orePrice = basePrice * (grade / 100) * (coeff / 100);

    list.innerHTML += '<div class="ore-row">' +

      '<span style="font-size:0.7rem;color:var(--text2)">品位</span>' +

      '<div class="ore-grade">' +

        '<input type="number" value="' + grade + '" min="1" max="21" step="0.1" onchange="updateOreGrade(' + idx + ',this.value)" style="width:70px">' +

        '<span style="font-size:0.75rem;color:var(--text2)">%</span>' +

        '<span style="font-size:0.65rem;color:var(--accent)">系数 ' + coeff.toFixed(1) + '%</span>' +

      '</div>' +

      '<div class="ore-result">' + orePrice.toFixed(0) + ' 元/吨</div>' +

      '<button class="ore-del" onclick="removeOreRow(' + idx + ')">×</button>' +

    '</div>';

  });

  updateTotal();

}



function addOreRow() {

  oreRows.push(10);

  document.getElementById('totalRow').style.display = 'flex';

  renderOreRows();

}



function removeOreRow(idx) {

  oreRows.splice(idx, 1);

  if (oreRows.length <= 1) document.getElementById('totalRow').style.display = 'none';

  renderOreRows();

}



function updateOreGrade(idx, val) {

  var g = parseFloat(val);

  if (isNaN(g) || g < 1) g = 1;

  if (g > 21) g = 21;

  oreRows[idx] = g;

  renderOreRows();

}



function updateMultiOres() {

  renderOreRows();

}



function updateTotal() {

  var total = 0;

  oreRows.forEach(function(g) {

    var c = getCoefficient(g);

    total += basePrice * (g / 100) * (c / 100);

  });

  document.getElementById('totalPrice').textContent = total.toFixed(0) + ' 元/吨';

}



// ==================== 初始化 ====================

function init() {

  buildPresetButtons();

  buildCoeffTable();

  renderOreRows();

  updateCalc();

  fetchPrice();

  // 每60秒自动刷新

  setInterval(fetchPrice, 60000);

}



init();
