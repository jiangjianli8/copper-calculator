<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>铜矿石计价计算器</title>
<style>
:root {
  --bg: #1a1a1e;
  --card: #252530;
  --card2: #2a2a38;
  --text: #e0e0e0;
  --text2: #a0a0b0;
  --copper: #d4784c;
  --copper-light: #f0a060;
  --copper-dark: #8b4513;
  --gold: #daa520;
  --accent: #4ecdc4;
  --danger: #e05555;
  --border: #3a3a48;
  --radius: 12px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  padding: 16px;
}
.container { width:100%; max-width:520px; }
.header {
  text-align: center;
  padding: 24px 0 16px;
}
.header h1 {
  font-size: 2.2rem;
  font-weight: 900;
  background: linear-gradient(135deg, var(--copper-light), var(--gold));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.header .subtitle {
  font-size: 0.8rem;
  color: var(--text2);
  margin-top: 4px;
}

/* 实时铜价卡片 */
.price-card {
  background: linear-gradient(135deg, #2a2218, #1e1a14);
  border: 1px solid var(--copper-dark);
  border-radius: var(--radius);
  padding: 16px 20px;
  margin-bottom: 16px;
  position: relative;
  overflow: hidden;
}
.price-card::before {
  content: '';
  position: absolute;
  top: -50%;
  right: -30%;
  width: 120px;
  height: 120px;
  background: radial-gradient(circle, rgba(212,120,76,0.15) 0%, transparent 70%);
  border-radius: 50%;
}
.price-label {
  font-size: 0.75rem;
  color: var(--copper-light);
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.price-label .dot {
  width: 8px; height: 8px;
  background: #4caf50;
  border-radius: 50%;
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%,100% { opacity:1; box-shadow: 0 0 4px #4caf50; }
  50% { opacity:0.4; box-shadow: 0 0 8px #4caf50; }
}
.price-value {
  font-size: 2.4rem;
  font-weight: 800;
  color: var(--copper-light);
  line-height: 1;
}
.price-value .unit {
  font-size: 0.9rem;
  font-weight: 400;
  color: var(--text2);
  margin-left: 4px;
}
.price-meta {
  font-size: 0.7rem;
  color: var(--text2);
  margin-top: 4px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.refresh-btn {
  background: rgba(212,120,76,0.2);
  border: 1px solid var(--copper-dark);
  color: var(--copper-light);
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 0.7rem;
  cursor: pointer;
  transition: all 0.2s;
}
.refresh-btn:hover { background: rgba(212,120,76,0.35); }
.refresh-btn:active { transform: scale(0.95); }
.manual-price {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 10px;
  font-size: 0.75rem;
}
.manual-price input {
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 4px 10px;
  border-radius: 6px;
  width: 100px;
  font-size: 0.75rem;
  text-align: center;
}
.manual-price button {
  background: var(--copper-dark);
  border: none;
  color: #fff;
  padding: 4px 12px;
  border-radius: 6px;
  font-size: 0.7rem;
  cursor: pointer;
}
.manual-price .toggle {
  font-size: 0.65rem;
  color: var(--copper-light);
  cursor: pointer;
  text-decoration: underline;
}

/* 计算器卡片 */
.calc-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 16px;
}
.calc-card h2 {
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--text2);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.calc-card h2 .icon { font-size: 1.2rem; }

/* 品位滑块 */
.grade-section { margin-bottom: 16px; }
.grade-label {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 8px;
}
.grade-label .name { font-size: 0.8rem; color: var(--text2); }
.grade-label .value {
  font-size: 1.8rem;
  font-weight: 700;
  color: var(--copper-light);
}
.grade-label .value .pct { font-size: 1rem; color: var(--text2); }
.slider-wrap {
  position: relative;
  padding: 4px 0;
}
input[type=range] {
  -webkit-appearance: none;
  width: 100%;
  height: 8px;
  border-radius: 4px;
  background: linear-gradient(90deg, #5a3a1a, var(--copper), var(--gold));
  outline: none;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 36px; height: 36px;
  border-radius: 50%;
  background: var(--copper-light);
  border: 3px solid #fff;
  cursor: pointer;
  box-shadow: 0 2px 12px rgba(212,120,76,0.5);
}
.grade-ticks {
  display: flex;
  justify-content: space-between;
  font-size: 0.6rem;
  color: var(--text2);
  padding: 4px 8px 0;
}
.grade-presets {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: 8px;
}
.grade-presets button {
  background: var(--card2);
  border: 1px solid var(--border);
  color: var(--text2);
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 0.7rem;
  cursor: pointer;
  transition: all 0.2s;
}
.grade-presets button:hover {
  border-color: var(--copper);
  color: var(--copper-light);
}
.grade-presets button.active {
  background: rgba(212,120,76,0.2);
  border-color: var(--copper);
  color: var(--copper-light);
}

/* 系数显示 */
.coeff-display {
  background: var(--card2);
  border-radius: 10px;
  padding: 12px 16px;
  margin-bottom: 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.coeff-display .label { font-size: 0.75rem; color: var(--text2); }
.coeff-display .value {
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--accent);
}

/* 结果卡片 */
.result-card {
  background: linear-gradient(135deg, #2a2218, #1e1a14);
  border: 2px solid var(--copper-dark);
  border-radius: var(--radius);
  padding: 20px;
  text-align: center;
  margin-bottom: 16px;
}
.result-card .label {
  font-size: 0.75rem;
  color: var(--copper-light);
  margin-bottom: 8px;
}
.result-card .value {
  font-size: 2.8rem;
  font-weight: 800;
  color: var(--gold);
  line-height: 1;
}
.result-card .unit {
  font-size: 0.85rem;
  font-weight: 400;
  color: var(--text2);
}
.result-formula {
  font-size: 0.7rem;
  color: var(--text2);
  margin-top: 8px;
  line-height: 1.5;
}

/* 系数参考表 */
.coeff-table-wrap {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s ease;
}
.coeff-table-wrap.open { max-height: 500px; }
.coeff-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.75rem;
  margin-top: 12px;
}
.coeff-table th, .coeff-table td {
  padding: 8px 12px;
  text-align: center;
  border-bottom: 1px solid var(--border);
}
.coeff-table th {
  color: var(--text2);
  font-weight: 500;
  font-size: 0.7rem;
}
.coeff-table tr:hover td { background: rgba(212,120,76,0.08); }
.coeff-table tr.current td { background: rgba(212,120,76,0.2); color: var(--copper-light); font-weight: 600; }
.toggle-table-btn {
  width: 100%;
  background: none;
  border: 1px dashed var(--border);
  color: var(--text2);
  padding: 8px;
  border-radius: 8px;
  font-size: 0.7rem;
  cursor: pointer;
  margin-top: 8px;
}
.toggle-table-btn:hover { border-color: var(--copper); color: var(--copper-light); }

/* 多矿计算 */
.multi-ores {
  margin-top: 16px;
}
.multi-ores h3 {
  font-size: 0.8rem;
  color: var(--text2);
  margin-bottom: 8px;
}
.ore-row {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-bottom: 8px;
  padding: 10px;
  background: var(--card2);
  border-radius: 8px;
}
.ore-row .ore-grade {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 4px;
}
.ore-row input {
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 6px 8px;
  border-radius: 6px;
  width: 70px;
  font-size: 0.8rem;
  text-align: center;
}
.ore-row .ore-result {
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--copper-light);
  min-width: 90px;
  text-align: right;
}
.ore-row .ore-del {
  background: none;
  border: none;
  color: var(--danger);
  cursor: pointer;
  font-size: 1.2rem;
  padding: 0 4px;
}
.add-ore-btn {
  width: 100%;
  background: none;
  border: 1px dashed var(--border);
  color: var(--text2);
  padding: 8px;
  border-radius: 8px;
  font-size: 0.7rem;
  cursor: pointer;
  margin-bottom: 8px;
}
.add-ore-btn:hover { border-color: var(--accent); color: var(--accent); }
.total-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 16px;
  background: rgba(212,120,76,0.1);
  border-radius: 10px;
  border: 1px solid var(--copper-dark);
}
.total-row .label { font-size: 0.8rem; color: var(--copper-light); }
.total-row .value { font-size: 1.2rem; font-weight: 700; color: var(--gold); }

/* Footer */
.footer {
  text-align: center;
  padding: 16px;
  font-size: 0.65rem;
  color: var(--text2);
}
.price-error {
  color: var(--danger);
  font-size: 0.7rem;
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>铜矿石套保计算器</h1>
    <div class="subtitle">基于上期所沪铜期货主连行情</div>
  </div>

  <!-- 实时铜价 -->
  <div class="price-card">
    <div class="price-label"><span class="dot"></span> 实时铜价参考（沪铜连续）</div>
    <div class="price-value" id="priceDisplay">--<span class="unit">元/吨</span></div>
    <div class="price-meta">
      <span id="priceTime">加载中...</span>
      <button class="refresh-btn" onclick="fetchPrice()">🔄 刷新</button>
    </div>
    <div class="manual-price" id="manualPriceRow" style="display:none">
      <span>手动输入:</span>
      <input type="number" id="manualPriceInput" placeholder="价格 (元/吨)">
      <button onclick="setManualPrice()">确定</button>
    </div>
    <span class="toggle" style="font-size:0.65rem;color:var(--text2);cursor:pointer;margin-top:4px;display:inline-block" onclick="document.getElementById('manualPriceRow').style.display='flex';this.style.display='none'">或手动输入价格</span>
  </div>

  <!-- 计算器 -->
  <div class="calc-card">
    <h2><span class="icon">📐</span> 矿石计价计算</h2>

    <div class="grade-section">
      <div class="grade-label">
        <span class="name">铜矿石品位 (Cu%)</span>
        <span class="value" id="gradeValue">5<span class="pct">%</span></span>
      </div>
      <div class="slider-wrap">
        <input type="range" id="gradeSlider" min="1" max="21" value="5" step="0.1" oninput="updateCalc()">
      </div>
      <div class="grade-ticks"><span>1%</span><span>5%</span><span>10%</span><span>15%</span><span>21%</span></div>
      <div class="grade-presets" id="gradePresets"></div>
    </div>

    <div class="coeff-display">
      <span class="label">📊 铜计价系数</span>
      <span class="value" id="coeffValue">65.00%</span>
    </div>
  </div>

  <!-- 结果 -->
  <div class="result-card">
    <div class="label">💰 铜矿石单价</div>
    <div class="value" id="orePrice">--<span class="unit">元/吨</span></div>
    <div class="result-formula" id="formulaDisplay"></div>
  </div>

  <!-- 多矿计算 -->
  

  

<script>
// ==================== 系数表数据 ====================
var COEFF_TABLE = [
  [1,40],[2,45],[3,50],[4,60],[5,65],[6,68],[7,70],[8,72],[9,74],[10,76],
  [11,78],[12,80],[13,83],[14,86],[15,88],[16,89],[17,90],[18,91],[19,92],[20,93],[21,95]
];

var basePrice = 102930; // 默认价格
var manualOverride = false;

// ==================== 系数查表（线性插值） ====================
function getCoefficient(grade) {
  if (grade <= 1) return 40;
  if (grade >= 21) return 95;
  for (var i = 0; i < COEFF_TABLE.length - 1; i++) {
    var g1 = COEFF_TABLE[i][0], c1 = COEFF_TABLE[i][1];
    var g2 = COEFF_TABLE[i+1][0], c2 = COEFF_TABLE[i+1][1];
    if (grade >= g1 && grade <= g2) {
      var t = (grade - g1) / (g2 - g1);
      return c1 + t * (c2 - c1);
    }
  }
  return 95;
}

// ==================== 计算 ====================
function updateCalc() {
  var grade = parseFloat(document.getElementById('gradeSlider').value);
  var coeff = getCoefficient(grade);
  var orePrice = basePrice * (grade / 100) * (coeff / 100);

  document.getElementById('gradeValue').innerHTML = grade.toFixed(1) + '<span class="pct">%</span>';
  document.getElementById('coeffValue').textContent = coeff.toFixed(2) + '%';
  document.getElementById('orePrice').innerHTML = orePrice.toFixed(0) + '<span class="unit">元/吨</span>';
  document.getElementById('formulaDisplay').textContent =
    basePrice.toLocaleString() + ' × ' + grade.toFixed(1) + '% × ' + coeff.toFixed(2) + '% = ' + orePrice.toFixed(0) + ' 元/吨';

  // 高亮当前行
  highlightTableRow(grade);
  // 更新预设按钮
  updatePresetButtons(grade);
  // 更新多矿批量
  updateMultiOres();
}

function highlightTableRow(grade) {
  var rows = document.querySelectorAll('#coeffTable tr');
  var intGrade = Math.round(grade);
  rows.forEach(function(r) { r.classList.remove('current'); });
  // 找最接近的整数行
  rows.forEach(function(r) {
    var cells = r.querySelectorAll('td');
    if (cells.length > 0 && parseInt(cells[0].textContent) === intGrade) {
      r.classList.add('current');
    }
  });
}

// ==================== 价格获取 ====================
function fetchPrice() {
  var display = document.getElementById('priceDisplay');
  var timeEl = document.getElementById('priceTime');
  var dot = document.querySelector('.price-label .dot');

  // Try live API first (api.fsxsymall.com), fallback to static JSON (GitHub Actions)
  var API_URL = 'https://api.fsxsymall.com/api/copper-price';

  fetch(API_URL + '?_=' + Date.now(), { signal: AbortSignal.timeout(5000) })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var price = data.success ? data.data.price : data.price;
      if (!price) throw new Error('no price');
      if (!manualOverride) basePrice = price;
      display.innerHTML = price.toLocaleString() + '<span class="unit">元/吨</span>';
      timeEl.textContent = (data.date || data.time || '') + ' · 实时行情';
      if (dot) dot.style.background = '#4caf50';
      updateCalcDisplay();
    })
    .catch(function() {
      fetch('data/price.json?_=' + Date.now())
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (data.price) {
            if (!manualOverride) basePrice = data.price;
            display.innerHTML = data.price.toLocaleString() + '<span class="unit">元/吨</span>';
            timeEl.textContent = (data.updated_at || data.date || '') + ' · 静态缓存';
            if (dot) dot.style.background = '#ff9800';
            updateCalcDisplay();
          } else {
            useDefaultPrice(display, timeEl, dot);
          }
        })
        .catch(function() {
          useDefaultPrice(display, timeEl, dot);
        });
    });
}

function useDefaultPrice(display, timeEl, dot) {
  if (!basePrice) basePrice = 102930;
  display.innerHTML = basePrice.toLocaleString() + '<span class="unit">元/吨</span>';
  timeEl.innerHTML = '<span class="price-error">离线模式 · 使用默认参考价</span>';
  if (dot) dot.style.background = '#e05555';
  updateCalcDisplay();
}

function updateCalcDisplay() {
  if (!manualOverride) updateCalc();
}
function setManualPrice() {
  var val = parseFloat(document.getElementById('manualPriceInput').value);
  if (val > 0) {
    basePrice = val;
    manualOverride = true;
    document.getElementById('priceDisplay').innerHTML = val.toLocaleString() + '<span class="unit">元/吨</span>';
    document.getElementById('priceTime').textContent = '手动输入价格';
    updateCalc();
  }
}

// ==================== 预设按钮 ====================
function buildPresetButtons() {
  var container = document.getElementById('gradePresets');
  var presets = [1,3,5,8,10,12,15,18,21];
  presets.forEach(function(g) {
    var btn = document.createElement('button');
    btn.textContent = g + '%';
    btn.onclick = function() {
      document.getElementById('gradeSlider').value = g;
      updateCalc();
    };
    container.appendChild(btn);
  });
}

function updatePresetButtons(grade) {
  var buttons = document.querySelectorAll('#gradePresets button');
  buttons.forEach(function(btn) {
    var g = parseInt(btn.textContent);
    if (Math.abs(g - grade) < 0.05) {
      btn.classList.add('active');
    } else {
      btn.classList.remove('active');
    }
  });
}

// ==================== 系数参考表 ====================
function buildCoeffTable() {
  var table = document.getElementById('coeffTable');
  var html = '<tr><th>铜品位 Cu%</th><th>铜系数</th><th>铜品位 Cu%</th><th>铜系数</th></tr>';
  var half = Math.ceil(COEFF_TABLE.length / 2);
  for (var i = 0; i < half; i++) {
    var left = COEFF_TABLE[i];
    var right = COEFF_TABLE[i + half];
    html += '<tr><td>' + left[0] + '%</td><td>' + left[1] + '%</td>';
    if (right) {
      html += '<td>' + right[0] + '%</td><td>' + right[1] + '%</td>';
    } else {
      html += '<td></td><td></td>';
    }
    html += '</tr>';
  }
  table.innerHTML = html;
}

function toggleTable() {
  var wrap = document.getElementById('coeffTableWrap');
  wrap.classList.toggle('open');
}

// ==================== 多矿批量 ====================
var oreRows = [5, 8, 12]; // 默认三行

function renderOreRows() {
  var list = document.getElementById('oreList');
  list.innerHTML = '';
  oreRows.forEach(function(grade, idx) {
    var coeff = getCoefficient(grade);
    var orePrice = basePrice * (grade / 100) * (coeff / 100);
    list.innerHTML += '<div class="ore-row">' +
      '<span style="font-size:0.7rem;color:var(--text2)">品位</span>' +
      '<div class="ore-grade">' +
        '<input type="number" value="' + grade + '" min="1" max="21" step="0.1" onchange="updateOreGrade(' + idx + ',this.value)" style="width:70px">' +
        '<span style="font-size:0.75rem;color:var(--text2)">%</span>' +
        '<span style="font-size:0.65rem;color:var(--accent)">系数 ' + coeff.toFixed(1) + '%</span>' +
      '</div>' +
      '<div class="ore-result">' + orePrice.toFixed(0) + ' 元/吨</div>' +
      '<button class="ore-del" onclick="removeOreRow(' + idx + ')">×</button>' +
    '</div>';
  });
  updateTotal();
}

function addOreRow() {
  oreRows.push(10);
  document.getElementById('totalRow').style.display = 'flex';
  renderOreRows();
}

function removeOreRow(idx) {
  oreRows.splice(idx, 1);
  if (oreRows.length <= 1) document.getElementById('totalRow').style.display = 'none';
  renderOreRows();
}

function updateOreGrade(idx, val) {
  var g = parseFloat(val);
  if (isNaN(g) || g < 1) g = 1;
  if (g > 21) g = 21;
  oreRows[idx] = g;
  renderOreRows();
}

function updateMultiOres() {
  renderOreRows();
}

function updateTotal() {
  var total = 0;
  oreRows.forEach(function(g) {
    var c = getCoefficient(g);
    total += basePrice * (g / 100) * (c / 100);
  });
  document.getElementById('totalPrice').textContent = total.toFixed(0) + ' 元/吨';
}

// ==================== 初始化 ====================
function init() {
  buildPresetButtons();
  buildCoeffTable();
  renderOreRows();
  updateCalc();
  fetchPrice();
  // 每60秒自动刷新
  setInterval(fetchPrice, 60000);
}

init();
</script>

  <div class="footer">
    <span style="font-weight:900;color:#2196F3;font-size:1.95rem">矿链通1.0</span>
    <span style="font-weight:900;color:#2196F3;font-size:1.95rem">-佛山鑫善源</span>
  </div>
</body>
</html>
