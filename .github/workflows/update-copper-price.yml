name: Update Copper Price

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

jobs:
  update-price:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install akshare

      - name: Fetch copper price from AKShare
        run: python3 scripts/fetch-copper-price.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/price.json
          if git diff --staged --quiet; then
            echo "No change"
          else
            git commit -m "Copper price update: $(date +'%Y-%m-%d %H:%M')"
            git push
          fi
